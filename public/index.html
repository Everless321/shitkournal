<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.H.I.T Journal PDF Fetcher</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #262626;
    --text: #e5e5e5;
    --dim: #666;
    --cyan: #22d3ee;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --blue: #60a5fa;
  }

  body {
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  .container {
    width: 100%;
    max-width: 640px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .header p {
    font-size: 12px;
    color: var(--dim);
  }

  .input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .input-group input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }

  .input-group input:focus {
    border-color: var(--cyan);
  }

  .input-group input::placeholder {
    color: var(--dim);
  }

  .btn {
    background: var(--cyan);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 12px 20px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .2s;
  }

  .btn:hover { opacity: .85; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .terminal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    display: none;
  }

  .terminal.active { display: block; }

  .terminal-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }

  .terminal-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .terminal-dot:nth-child(1) { background: #f87171; }
  .terminal-dot:nth-child(2) { background: #facc15; }
  .terminal-dot:nth-child(3) { background: #4ade80; }

  .terminal-title {
    flex: 1;
    text-align: center;
    font-size: 11px;
    color: var(--dim);
  }

  .terminal-body {
    padding: 16px;
    font-size: 12.5px;
    line-height: 1.7;
    max-height: 480px;
    overflow-y: auto;
  }

  .log-step {
    margin-top: 12px;
    color: var(--cyan);
    font-weight: 600;
  }

  .log-step:first-child { margin-top: 0; }

  .log-detail {
    padding-left: 16px;
    color: var(--dim);
  }

  .log-detail .val { color: var(--text); }
  .log-detail .val-highlight { color: var(--yellow); }
  .log-detail .val-cyan { color: var(--cyan); }

  .log-ok {
    padding-left: 16px;
    color: var(--green);
  }

  .log-fail {
    padding-left: 16px;
    color: var(--red);
  }

  .log-spinner {
    padding-left: 16px;
    color: var(--dim);
  }

  @keyframes spin {
    0% { content: '⠋'; }
    10% { content: '⠙'; }
    20% { content: '⠹'; }
    30% { content: '⠸'; }
    40% { content: '⠼'; }
    50% { content: '⠴'; }
    60% { content: '⠦'; }
    70% { content: '⠧'; }
    80% { content: '⠇'; }
    90% { content: '⠏'; }
  }

  .spinner::before {
    content: '⠋';
    animation: spin .8s steps(10) infinite;
    display: inline-block;
    margin-right: 6px;
  }

  .download-card {
    margin-top: 16px;
    padding: 16px;
    background: rgba(34, 211, 238, .06);
    border: 1px solid rgba(34, 211, 238, .2);
    border-radius: 6px;
    display: none;
  }

  .download-card.active { display: block; }

  .download-card .meta {
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .download-card .meta strong {
    color: var(--text);
    font-weight: 500;
  }

  .download-card .title-line {
    font-size: 14px;
    color: var(--yellow);
    font-weight: 600;
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .btn-download {
    background: var(--green);
    width: 100%;
    padding: 10px;
    font-size: 13px;
    margin-top: 4px;
  }

  .footer {
    margin-top: 40px;
    text-align: center;
    font-size: 11px;
    color: var(--dim);
  }

  .footer a {
    color: var(--cyan);
    text-decoration: none;
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin: 8px 16px 0;
    overflow: hidden;
    display: none;
  }

  .progress-bar.active { display: block; }

  .progress-fill {
    height: 100%;
    background: var(--cyan);
    border-radius: 2px;
    width: 0%;
    transition: width .3s ease;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>S.H.I.T JOURNAL</h1>
    <p>PDF Fetcher &mdash; Cloudflare R2 &gt; Edge Cache &gt; Download</p>
  </div>

  <div class="input-group">
    <input type="text" id="input" placeholder="Paste preprint URL or ID ..." autofocus>
    <button class="btn" id="fetchBtn" onclick="start()">Fetch</button>
  </div>

  <div class="terminal" id="terminal">
    <div class="terminal-bar">
      <div class="terminal-dot"></div>
      <div class="terminal-dot"></div>
      <div class="terminal-dot"></div>
      <span class="terminal-title">pdf-fetcher</span>
    </div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="terminal-body" id="logs"></div>
  </div>

  <div class="download-card" id="card"></div>

  <div class="footer">
    Cloudflare Workers + R2 &middot; Edge cached &middot; <a href="https://shitjournal.org" target="_blank">shitjournal.org</a>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

const UUID_RE = /[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i;

function addLog(type, text) {
  const el = document.createElement('div');
  el.className = `log-${type}`;
  el.innerHTML = text;
  $('logs').appendChild(el);
  $('logs').scrollTop = $('logs').scrollHeight;
}

function step(s) { addLog('step', `▶ ${s}`); }
function detail(k, v, cls = 'val') { addLog('detail', `${k}: <span class="${cls}">${v}</span>`); }
function ok(s) { addLog('ok', `✓ ${s}`); }
function fail(s) { addLog('fail', `✗ ${s}`); }

function showSpinner(msg) {
  const el = document.createElement('div');
  el.className = 'log-spinner';
  el.id = 'current-spinner';
  el.innerHTML = `<span class="spinner"></span>${msg}`;
  $('logs').appendChild(el);
  $('logs').scrollTop = $('logs').scrollHeight;
}

function removeSpinner() {
  const s = $('current-spinner');
  if (s) s.remove();
}

function setProgress(pct) {
  $('progressBar').classList.add('active');
  $('progressFill').style.width = `${pct}%`;
}

function resetUI() {
  $('logs').innerHTML = '';
  $('card').innerHTML = '';
  $('card').classList.remove('active');
  $('progressBar').classList.remove('active');
  $('progressFill').style.width = '0%';
  $('terminal').classList.add('active');
}

async function start() {
  const raw = $('input').value.trim();
  if (!raw) return;

  const match = raw.match(UUID_RE);
  if (!match) {
    resetUI();
    step('Parsing input');
    detail('input', raw);
    fail('Cannot extract UUID from input');
    return;
  }

  const id = match[0];
  $('fetchBtn').disabled = true;
  resetUI();

  const t0 = performance.now();

  // Step 1: Parse
  step('Parsing input');
  detail('input', raw);
  ok(`Preprint ID: <span class="val-cyan">${id}</span>`);
  setProgress(10);

  // Step 2: Fetch metadata
  step('Querying preprint metadata');
  detail('endpoint', '/api/info');
  showSpinner('Fetching from Supabase...');

  const t1 = performance.now();
  let data;
  try {
    const res = await fetch(`/api/info?id=${id}`);
    const elapsed = (performance.now() - t1).toFixed(0);
    removeSpinner();

    if (!res.ok) {
      const err = await res.json();
      detail('status', res.status);
      detail('time', `${elapsed}ms`);
      fail(err.error || 'Request failed');
      $('fetchBtn').disabled = false;
      return;
    }

    data = await res.json();
    detail('status', '200');
    detail('time', `${elapsed}ms`);
    setProgress(50);
  } catch (e) {
    removeSpinner();
    fail(`Network error: ${e.message}`);
    $('fetchBtn').disabled = false;
    return;
  }

  ok('Record found');
  if (data._cache === 'HIT') ok('Served from edge cache');
  detail('title', data.title || '?', 'val-highlight');
  detail('author', data.author || '?');
  detail('institution', data.institution || '?');
  detail('discipline', data.discipline || '?');
  detail('created', data.created_at || '?');
  setProgress(70);

  // Step 3: Ready
  step('Storage');
  detail('pdf_path', data.pdf_path, 'val-cyan');
  detail('filename', data.filename);
  detail('cache', data._cache === 'HIT' ? 'Cloudflare Edge (24h)' : 'Supabase origin');
  detail('pdf_store', 'R2 persistent bucket');
  ok('Download ready');
  setProgress(90);

  // Step 4: Done
  const total = (performance.now() - t0).toFixed(0);
  step('Ready');
  ok(`All steps completed in ${total}ms`);
  setProgress(100);

  // Show download card
  const card = $('card');
  card.innerHTML = `
    <div class="title-line">${esc(data.title)}</div>
    <div class="meta">
      <strong>${esc(data.author)}</strong> &middot; ${esc(data.institution)}<br>
      ${esc(data.discipline)} &middot; ${esc(data.created_at?.split('T')[0] || '')}
    </div>
    <button class="btn btn-download" onclick="download('${id}', '${esc(data.title)}')">
      Download PDF
    </button>
  `;
  card.classList.add('active');
  $('fetchBtn').disabled = false;
}

function download(id, title) {
  const a = document.createElement('a');
  a.href = `/api/download?id=${id}`;
  a.download = `${title || id}.pdf`;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

$('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') start();
});
</script>
</body>
</html>
