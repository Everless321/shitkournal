name = "shitkournal"
main = "src/worker.js"
compatibility_date = "2024-12-01"

[assets]
directory = "./public"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"

routes = [
  { pattern = "shit.everless.dev", custom_domain = true }
]

[[r2_buckets]]
binding = "PDF_BUCKET"
bucket_name = "shitkournal-pdfs"
